name: Prebuild Docker Image

on:
  push:
    branches: [main]
    paths:
      - renv.lock
      - .Rprofile
      - renv/**
      - Dockerfile
      - shiny-server.conf
      - app.R
      - server.R
      - ui.R
      - plotly_helpers.R

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/austinalexander01/cbb-portal-analysis:latest
          # Layer cache stored in GitHub Actions cache.
          # renv::restore() (~20 min) is only re-run when renv.lock changes —
          # all other file edits reuse the cached layer and finish in < 2 min.
          cache-from: type=gha
          cache-to: type=gha,mode=max
